version: "3.6"

volumes:
  db_data:
  # grafana_lib:
  # grafana_etc:
  # grafana_log:

services:
  postgres:
    image: postgres:14
    restart: always
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}

  worker:
    # NOTE: to opt out of basic image pull tracking, comment out the current image
    # and uncomment the next line (which will pull from Docker Hub directly).
    # image: mergestat/worker:2.3.2-beta
    image: images.mergestat.com/mergestat/worker:2.3.2-beta
    privileged: true
    stop_grace_period: 10m
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/metrics"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_CONNECTION: postgres://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/postgres?sslmode=disable
      CONCURRENCY: 5
      # Retry policy for failed/timed-out syncs: up to SYNC_MAX_RETRIES attempts with
      # exponential backoff starting at SYNC_RETRY_BACKOFF_SECONDS; then marked FAILED.
      SYNC_MAX_RETRIES: ${SYNC_MAX_RETRIES:-3}
      SYNC_RETRY_BACKOFF_SECONDS: ${SYNC_RETRY_BACKOFF_SECONDS:-60}
      # GIT_COMMITS sync walks every branch by default (commits only on non-default branches
      # are included). Set to 0 to sync the default branch (HEAD) only.
      GIT_SYNC_ALL_BRANCHES: ${GIT_SYNC_ALL_BRANCHES:-1}
      GITHUB_RATE_LIMIT: 1/2
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:-password}
      LOG_LEVEL: debug
      DEBUG: 1
      PRETTY_LOGS: 1
      GITHUB_WORKFLOW_PER_PAGE: 30
      GITHUB_WORKFLOW_RUNS_PER_PAGE: 30
      GITHUB_WORKFLOW_JOBS_PER_PAGE: 30
    ports:
      - 3301:8080
    # NOTE: Uncomment the following to mount a path on disk to the container to access local git repos.
    # When adding a the repo in the UI, use file:///projects/<repo-name> to access the repo.
    # volumes:
    #   - ~/projects:/projects

  graphql:
    # See NOTE above in worker service.
    # image: mergestat/graphql:2.3.2-beta
    image: images.mergestat.com/mergestat/graphql:2.3.2-beta
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      worker:
        # this is to ensure all migrations are run before the API starts up
        condition: service_healthy
    ports:
      - 5433:5433
    command:
      - "--connection"
      - "postgres://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/postgres?sslmode=disable"
      - "--port"
      - "5433"
      - "--schema"
      - "mergestat,sqlq,public"
      - "--append-plugins"
      - "@graphile-contrib/pg-simplify-inflector,postgraphile-plugin-connection-filter,/graphql/container-sync-jobs/index.js,/graphql/exec-sql/index.js,/graphql/service-credentials/index.js"
      - "-o"
      - "--subscriptions"
      - "--retry-on-init-fail"
      - "--dynamic-json"
      - "--no-setof-functions-contain-nulls"
      - "--no-ignore-rbac"
      - "--extended-errors=errcode"
      - "--disable-graphiql"
      - "--enable-query-batching"
      - "--disable-query-log"
      - "--legacy-relations=omit"
      - "--jwt-secret=${JWT_SECRET:-secret}"
      - "--default-role=mergestat_anonymous"
    environment:
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:-password}
      DISPLAY_PG_HOSTNAME: localhost
      DISPLAY_PG_PORT: 5432
      DISPLAY_PG_DATABASE: postgres
      DISPLAY_PG_USER: postgres

  ui:
    # See NOTE above in worker service.
    # image: mergestat/console:2.3.2-beta
    image: images.mergestat.com/mergestat/console:2.3.2-beta
    restart: always
    depends_on:
      - graphql
    ports:
      - 3300:3000
    environment:
      POSTGRAPHILE_API: http://graphql:5433/graphql
      POSTGRES_CONNECTION: postgres://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/postgres?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-secret} # should match - "--jwt-secret=secret" flag in graphql service
      INSECURE_SESSION_COOKIE: 1
      # --- OAuth (SSO) login via NextAuth (optional) ---
      # Leave GOOGLE_CLIENT_ID/SECRET unset to disable the "Sign in with Google" button.
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-secret} # encrypts the NextAuth session; set a strong random value in production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3300} # public base URL of the UI; OAuth callbacks are derived from this
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_DEFAULT_ROLE: ${OAUTH_DEFAULT_ROLE:-READ_ONLY} # role for OAuth users with no override (ADMIN|USER|QUERIES_ONLY|READ_ONLY|DEMO)
      OAUTH_ALLOWED_DOMAINS: ${OAUTH_ALLOWED_DOMAINS:-} # optional comma-separated email-domain allow-list, e.g. "mergestat.com"
    labels:
      shipyard.route: '/'

  # --- Observability (Prometheus + Grafana) ---
  # Prometheus scrapes the worker's /metrics endpoint (requires DEBUG=1 on the worker,
  # which is set above). Grafana ships a prebuilt "MergeStat — Repo Syncs" dashboard.
  # Browse Grafana at http://localhost:3000 (anonymous viewer access is enabled).
  prometheus:
    image: prom/prometheus:latest
    restart: always
    depends_on:
      - worker
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - 9090:9090

  grafana:
    image: grafana/grafana-oss:latest
    restart: always
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - 3000:3000
